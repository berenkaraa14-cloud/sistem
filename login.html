<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-10">
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">

    <input type="text" id="ad_soyad" placeholder="Ad Soyad" class="w-full border p-2 mb-2">
    <input type="email" id="email" placeholder="E-posta" class="w-full border p-2 mb-2">
    <input type="password" id="password" placeholder="Şifre" class="w-full border p-2 mb-4">

    <button id="kayitBtn" class="w-full bg-blue-500 text-white p-2">Kayıt Ol</button>

</div>

    <script>
       document.getElementById('kayitBtn').addEventListener('click', async () => {

    const ad = document.getElementById('ad_soyad').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const response = await fetch("register.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            ad_soyad: ad,
            email: email,
            password: password
        })
    });

    const data = await response.json();

    if(data.status === "success"){
        alert("Kayıt başarılı!");
        window.location.href="index.html";
    }else{
        alert("Hata: " + data.message);
    }

});
    </script>
</body>
</html>
