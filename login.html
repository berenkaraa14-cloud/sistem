<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | LiveChat AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-orange-500">Üyelik Oluştur</h2>
        <form action="https://wa.me/905XXXXXXXXX" method="GET" target="_blank">
            <input type="text" name="text" placeholder="Adınız Soyadınız" class="w-full p-3 mb-4 border rounded-lg" required>
            <input type="email" placeholder="E-posta Adresiniz" class="w-full p-3 mb-4 border rounded-lg" required>
            <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold hover:bg-orange-600">Kayıt Talebi Oluştur</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">Zaten üye misin? <a href="index.html" class="text-blue-500">Ana sayfaya dön</a></p>
    </div>
</body>
</html>
