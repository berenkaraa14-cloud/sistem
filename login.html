
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <input type="text" id="ad_soyad" placeholder="Ad Soyad" class="w-full border p-2 mb-2">
        <input type="email" id="email" placeholder="E-posta" class="w-full border p-2 mb-2">
        <input type="password" id="password" placeholder="Şifre" class="w-full border p-2 mb-4">
        <button id="kayitBtn" class="w-full bg-blue-500 text-white p-2">Kayıt Ol</button>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://xkjpitfhkhkaieggzcwlv.supabase.co', 
            'sb_publishable_e0_kcSm46jmgGmfRcbQe2Q_aAKAvvy-'
        );

        document.getElementById('kayitBtn').addEventListener('click', async () => {
            const ad = document.getElementById('ad_soyad').value;
            const em = document.getElementById('email').value;
            const pw = document.getElementById('password').value;

            const { error } = await supabase.from('profiles').insert([
                { full_name: ad, email: em, password: pw }
            ]);

            if (error) {
                alert("HATA: " + error.message);
            } else {
                alert("Kayıt başarılı! Şimdi yönlendiriliyoruz...");
                window.location.href = 'index.html'; // Burası seni ana sayfaya atacak
            }
        });
    </script>
</body>
</html>
