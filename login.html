<button onclick="kayitOl()" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition mt-4">Kayıt Ol</button>

<script>
    // Supabase tanımlaması en üstte olsun
    const supabase = supabase.createClient('https://xkjpitfhkhkaieggzcwlv.supabase.co', 'sb_publishable_e0_kcSm46jmgGmfRcbQe2Q_aAKAvvy-';

    // Fonksiyonu buraya (sayfanın altına) alıyoruz
    async function kayitOl() {
        console.log("Butona tıklandı, işlem başlıyor..."); // Hata takibi için
        
        const adSoyad = document.getElementById('ad_soyad').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!adSoyad || !email || !password) {
            alert("Lütfen tüm alanları doldur!");
            return;
        }

        const { data, error } = await supabase.from('profiles').insert([
            { full_name: adSoyad, email: email, password: password }
        ]);

        if (error) {
            alert("Hata: " + error.message);
            console.error("Supabase Hatası:", error);
        } else {
            alert("Kayıt başarılı!");
            window.location.href = 'index.html';
        }
    }
</script>
