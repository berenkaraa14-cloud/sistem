<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveChat AI | Premium Yazılım</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden-content { display: none; }
        .price-box { transition: transform 0.2s ease-in-out; }
        .price-box:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <section id="planlar" class="py-20 px-6">
        <h2 class="text-4xl font-extrabold text-center mb-16">Premium Planlar</h2>
        <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-10">

            <div class="price-box bg-white p-8 rounded-3xl border shadow-lg text-center">
                <h3 class="font-bold text-xl mb-4">Aylık</h3>
                <p class="text-5xl font-extrabold mb-6">$39</p>
                <button onclick="toggleOdeme('kutu1')" class="w-full bg-gray-900 text-white py-4 rounded-full font-bold hover:bg-gray-700 transition">Seç</button>
                <div id="kutu1" class="hidden-content mt-6 p-4 bg-gray-100 rounded-lg text-sm break-all font-mono border border-gray-200">
                    <p class="text-gray-700 mb-2">USDT TRC20 Adresi:</p>
                    <div class="flex items-center justify-between bg-white p-2 rounded-md border border-gray-300">
                        <span id="adres1">0xBURAYA_ADRES_YAZ_1</span>
                        <button onclick="copyToClipboard('adres1', this)" class="ml-3 text-orange-500 hover:text-orange-600">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="price-box bg-white p-8 rounded-3xl border-2 border-orange-500 shadow-2xl text-center scale-105">
                <span class="bg-orange-500 text-white text-xs px-4 py-1 rounded-full font-bold mb-4 inline-block">POPÜLER</span>
                <h3 class="font-bold text-xl text-orange-500 mb-4">6 Aylık</h3>
                <p class="text-5xl font-extrabold mb-6">$99</p>
                <button onclick="toggleOdeme('kutu2')" class="w-full bg-orange-500 text-white py-4 rounded-full font-bold hover:bg-orange-600 transition">Seç</button>
                <div id="kutu2" class="hidden-content mt-6 p-4 bg-gray-100 rounded-lg text-sm break-all font-mono border border-gray-200">
                    <p class="text-gray-700 mb-2">USDT TRC20 Adresi:</p>
                    <div class="flex items-center justify-between bg-white p-2 rounded-md border border-gray-300">
                        <span id="adres2">0xBURAYA_ADRES_YAZ_2</span>
                        <button onclick="copyToClipboard('adres2', this)" class="ml-3 text-orange-500 hover:text-orange-600">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="price-box bg-white p-8 rounded-3xl border shadow-lg text-center">
                <h3 class="font-bold text-xl mb-4">1 Yıllık</h3>
                <p class="text-5xl font-extrabold mb-6">$199</p>
                <button onclick="toggleOdeme('kutu3')" class="w-full bg-gray-900 text-white py-4 rounded-full font-bold hover:bg-gray-700 transition">Seç</button>
                <div id="kutu3" class="hidden-content mt-6 p-4 bg-gray-100 rounded-lg text-sm break-all font-mono border border-gray-200">
                    <p class="text-gray-700 mb-2">USDT TRC20 Adresi:</p>
                    <div class="flex items-center justify-between bg-white p-2 rounded-md border border-gray-300">
                        <span id="adres3">0xBURAYA_ADRES_YAZ_3</span>
                        <button onclick="copyToClipboard('adres3', this)" class="ml-3 text-orange-500 hover:text-orange-600">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Kutu açma fonksiyonu
        function toggleOdeme(id) {
            const box = document.getElementById(id);
            if (box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
            }
        }

        // Kopyalama fonksiyonu
        function copyToClipboard(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            btn.innerHTML = '<i class="fas fa-check text-green-500"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 2000);
        }
    </script>
</body>
</html>
