<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveChat AI | Premium Paketler</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="flex justify-between items-center py-6 px-10 bg-white border-b">
        <div class="text-2xl font-bold text-blue-600">LiveChat AI</div>
    </nav>

    <section class="py-16 px-6 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold text-center mb-10">Premium Planlar</h2>
        
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl border text-center shadow-sm">
                <h3 class="font-bold text-lg">Aylık</h3>
                <p class="text-2xl font-bold my-4">49$</p>
                <button onclick="showPayment('49$ Aylık')" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Bu Paketi Seç</button>
            </div>
            <div class="bg-white p-6 rounded-xl border-2 border-blue-600 text-center shadow-lg">
                <h3 class="font-bold text-lg text-blue-600">6 Aylık</h3>
                <p class="text-2xl font-bold my-4">249$</p>
                <button onclick="showPayment('249$ 6 Aylık')" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Bu Paketi Seç</button>
            </div>
            <div class="bg-white p-6 rounded-xl border text-center shadow-sm">
                <h3 class="font-bold text-lg">1 Yıllık</h3>
                <p class="text-2xl font-bold my-4">399$</p>
                <button onclick="showPayment('399$ 1 Yıllık')" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Bu Paketi Seç</button>
            </div>
        </div>
    </section>

    <section id="payment-box" class="hidden pb-20 px-6 max-w-md mx-auto text-center">
        <div class="bg-white p-8 rounded-2xl border shadow-xl">
            <h3 class="font-bold text-xl mb-4">Ödeme Adresi (TRC20)</h3>
            <p class="text-sm text-gray-500 mb-4">Lütfen seçtiğiniz tutarı aşağıdaki adrese gönderin.</p>
            <div class="bg-gray-100 p-3 rounded-lg font-mono text-sm break-all mb-6">BURAYA_USDT_ADRESINI_YAZ</div>
            
            <p class="text-xs text-red-500 mb-6">Ödemeyi yaptıktan sonra TXID numaranızı kopyalayın ve aşağıdan bildirin.</p>
            
            <a id="wp-link" href="#" class="block bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700">ÖDEMEYİ BİLDİR (WHATSAPP)</a>
        </div>
    </section>

    <script>
        function showPayment(plan) {
            document.getElementById('payment-box').classList.remove('hidden');
            const link = "https://wa.me/905XXXXXXXXX?text=Merhaba, " + plan + " paketini satın aldım. Ödeme TXID numaram: ";
            document.getElementById('wp-link').href = link;
        }
    </script>
</body>
</html>
