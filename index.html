<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LiveChat AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div id="ana-ekran" class="text-center p-10 bg-white rounded-2xl shadow-xl">
        <h1 class="text-4xl font-bold mb-4">LiveChat AI'a Hoş Geldin</h1>
        <button onclick="kayitFormunuGoster()" class="bg-orange-500 text-white px-8 py-3 rounded-full font-bold text-lg hover:bg-orange-600 transition">Hemen Başla</button>
    </div>

    <script>
        function kayitFormunuGoster() {
            // Butona basınca ana ekranı siliyor ve yerine kayıt formunu getiriyor
            document.getElementById('ana-ekran').innerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
                    <h2 class="text-2xl font-bold mb-6 text-center">Hesap Oluştur</h2>
                    <input type="text" id="ad_soyad" placeholder="Ad Soyad" class="w-full p-3 mb-4 border rounded-lg">
                    <input type="email" id="email" placeholder="E-posta" class="w-full p-3 mb-4 border rounded-lg">
                    <input type="password" id="password" placeholder="Şifre" class="w-full p-3 mb-4 border rounded-lg">
                    <button id="kayitBtn" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold">Kayıt Ol</button>
                </div>
            `;
            
            // Supabase işlemleri buraya (Form oluştuktan sonra buton çalışsın diye)
            const supabase = supabase.createClient(
                'https://xkjpitfhkhkaieggzcwlv.supabase.co', 
                'sb_publishable_e0_kcSm46jmgGmfRcbQe2Q_aAKAvvy-'
            );

            document.getElementById('kayitBtn').addEventListener('click', async () => {
                const ad = document.getElementById('ad_soyad').value;
                const em = document.getElementById('email').value;
                const pw = document.getElementById('password').value;

                const { error } = await supabase.from('profiles').insert([
                    { full_name: ad, email: em, password: pw }
                ]);

                if (error) {
                    alert("Hata: " + error.message);
                } else {
                    alert("Kayıt başarılı!");
                    location.reload(); // Sayfayı yenileyerek başa döner
                }
            });
        }
    </script>
</body>
</html>
